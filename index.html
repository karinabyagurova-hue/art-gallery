<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arya's Art Gallery</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#faf9f7;color:#1a1a1a;padding:1.5rem;max-width:960px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
h1{font-size:22px;font-weight:500}
.btn{padding:9px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn:hover{background:#333}
.btn-outline{background:#fff;color:#1a1a1a;border:1px solid #ddd}
.btn-outline:hover{background:#f5f5f5}
.btn-sm{padding:7px 12px;border-radius:7px;border:1px solid #e0e0e0;background:#fff;font-size:12px;cursor:pointer;color:#444}
.btn-sm:hover{background:#f5f5f5}
.btn-sm.danger:hover{background:#fdf0f0;color:#c0392b;border-color:#f5c6c6}
.btn-sm.primary{background:#1a1a1a;color:#fff;border:none}
.btn-sm.primary:hover{background:#333}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:#fff;border:1px solid #eee;border-radius:10px;padding:1rem;text-align:center}
.stat-num{font-size:26px;font-weight:500}
.stat-label{font-size:12px;color:#888;margin-top:4px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
input[type=text],select,input[type=date],textarea{font-family:inherit}
input[type=text]{flex:1;min-width:160px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;background:#fff}
select{padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.card{background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#f5f5f5;cursor:pointer}
.card-placeholder{width:100%;aspect-ratio:4/3;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:36px}
.card-body{padding:12px;display:flex;flex-direction:column;gap:5px;flex:1}
.card-name{font-size:15px;font-weight:500}
.card-date{font-size:12px;color:#999}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:#f2f2f2;color:#555;border:1px solid #e8e8e8;width:fit-content;margin-top:2px}
.card-notes{font-size:12px;color:#777;line-height:1.5;margin-top:2px}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.card-actions button{flex:1}
.empty,.loading{text-align:center;color:#aaa;padding:4rem;font-size:15px}

/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;overflow-y:auto}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:500;margin-bottom:1.25rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:12px;color:#777;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#999}
.form-group textarea{resize:vertical;min-height:70px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.hidden{display:none!important}
.msg-ok{background:#f0faf4;color:#1a7a4a;padding:.75rem;border-radius:8px;font-size:13px;margin-top:.75rem;text-align:center}
.msg-err{background:#fdf0f0;color:#c0392b;padding:.75rem;border-radius:8px;font-size:13px;margin-top:.75rem;text-align:center}

/* Photo picker */
.photo-pick{border:2px dashed #ddd;border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;color:#888;font-size:14px}
.photo-pick:hover{border-color:#aaa;background:#fafafa}
.photo-pick input{display:none}

/* Crop */
.crop-wrap{background:#111;border-radius:10px;overflow:hidden;margin-top:.75rem}
.crop-canvas-box{position:relative;touch-action:none;user-select:none}
.crop-canvas-box canvas{display:block;width:100%;height:auto}
.crop-bar{display:flex;gap:6px;padding:.6rem;background:#111;flex-wrap:wrap}
.crop-bar button{flex:1;min-width:70px;padding:8px 4px;border-radius:7px;border:1px solid #555;background:#222;color:#ddd;font-size:12px;cursor:pointer}
.crop-bar button:hover{background:#333}
.crop-bar button.ok{background:#fff;color:#111;border-color:#fff;font-weight:500}
.preview-img{width:100%;border-radius:8px;display:block;margin-top:.5rem}
.preview-acts{display:flex;gap:6px;margin-top:.5rem}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:300;cursor:zoom-out}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;object-fit:contain}
</style>
</head>
<body>

<div class="header">
  <h1>🎨 Arya's art gallery</h1>
  <div style="display:flex;gap:8px">
    <button class="btn-sm" onclick="load()">↻ Refresh</button>
    <button class="btn" onclick="openAdd()">+ Add artwork</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total artworks</div></div>
  <div class="stat"><div class="stat-num" id="s-mats">—</div><div class="stat-label">Materials used</div></div>
  <div class="stat"><div class="stat-num" id="s-latest">—</div><div class="stat-label">Latest entry</div></div>
</div>

<div class="controls">
  <input type="text" id="c-search" placeholder="Search by name or notes…" oninput="render()">
  <select id="c-mat" onchange="render()"><option value="">All materials</option></select>
  <select id="c-sort" onchange="render()">
    <option value="desc">Newest first</option>
    <option value="asc">Oldest first</option>
    <option value="az">A → Z</option>
  </select>
</div>

<div id="gallery" class="loading">Loading artwork…</div>

<!-- ADD MODAL -->
<div class="overlay hidden" id="add-overlay">
  <div class="modal">
    <h2>Add new artwork</h2>
    <div class="form-group"><label>Project name *</label><input type="text" id="a-name" placeholder="e.g. Rainbow butterfly"></div>
    <div class="form-group"><label>Date created</label><input type="date" id="a-date"></div>
    <div class="form-group"><label>Materials used</label>
      <select id="a-mat"><option value="">Select…</option><option>acrylic</option><option>pencil</option><option>felt pen</option><option>pen</option><option>watercolor</option><option>paper</option><option>clay</option><option>other</option></select>
    </div>
    <div class="form-group"><label>Notes (optional)</label><textarea id="a-notes" placeholder="e.g. Made at art class, theme was animals…"></textarea></div>
    <div class="form-group"><label>Photo</label>
      <div id="a-step-pick">
        <div class="photo-pick" onclick="document.getElementById('a-photo').click()">
          📷 Take a photo or choose from gallery
          <input type="file" id="a-photo" accept="image/*,image/heic,image/heif" onchange="onPhoto(this)">
        </div>
      </div>
      <div id="a-step-crop" class="hidden">
        <div class="crop-wrap"><div class="crop-canvas-box" id="a-crop-box"><canvas id="a-canvas"></canvas></div>
          <div class="crop-bar">
            <button onclick="rotateImg(-90)">↺ Left</button>
            <button onclick="rotateImg(90)">↻ Right</button>
            <button onclick="resetCropBox()">⊡ Reset</button>
            <button class="ok" onclick="applyCrop()">✓ Use crop</button>
          </div>
        </div>
        <button class="btn-sm" style="width:100%;margin-top:6px" onclick="clearPhoto()">↩ Change photo</button>
      </div>
      <div id="a-step-preview" class="hidden">
        <img id="a-preview" class="preview-img">
        <div class="preview-acts">
          <button class="btn-sm" style="flex:1" onclick="clearPhoto()">↩ Change</button>
          <button class="btn-sm" style="flex:1" onclick="reCrop()">✂ Re-crop</button>
        </div>
      </div>
    </div>
    <div id="a-msg"></div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeAdd()">Cancel</button>
      <button class="btn" id="a-btn" onclick="submitAdd()">Save artwork</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay hidden" id="edit-overlay">
  <div class="modal">
    <h2>✏️ Edit artwork</h2>
    <input type="hidden" id="e-row">
    <div class="form-group"><label>Project name *</label><input type="text" id="e-name"></div>
    <div class="form-group"><label>Date created</label><input type="date" id="e-date"></div>
    <div class="form-group"><label>Materials used</label>
      <select id="e-mat"><option value="">Select…</option><option>acrylic</option><option>pencil</option><option>felt pen</option><option>pen</option><option>watercolor</option><option>paper</option><option>clay</option><option>other</option></select>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="e-notes"></textarea></div>
    <div id="e-msg"></div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeEdit()">Cancel</button>
      <button class="btn" id="e-btn" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <img id="lb-img" src="">
</div>

<script>
const API='/api/proxy';
let all=[];
let origImg=null,rotation=0,croppedB64=null,photoName='artwork.jpg';
let cb={x:0,y:0,w:0,h:0},drag=null,dragOrig=null,cbOrig=null;
const HMIN=30;

// ── Helpers ──────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){
  if(!d)return '';
  const dt=new Date(d);
  if(isNaN(dt))return String(d);
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}
function toInputDate(d){
  if(!d)return '';
  const dt=new Date(d);
  if(isNaN(dt))return '';
  return dt.toISOString().split('T')[0];
}
function thumb(url){
  if(!url)return null;
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`;
  if(url.includes('thumbnail'))return url;
  return null;
}
function gv(row,...keys){
  for(const k of keys){
    const f=Object.keys(row).find(r=>r.replace(/"/g,'').trim().toLowerCase()===k.toLowerCase());
    if(f&&row[f]!==undefined&&row[f]!=='')return row[f];
  }return '';
}
function showStep(step){
  ['a-step-pick','a-step-crop','a-step-preview'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById(step).classList.remove('hidden');
}

// ── Gallery load & render ────────────────────────────────
async function load(){
  const el=document.getElementById('gallery');
  el.className='loading';el.textContent='Loading artwork…';
  try{
    const res=await fetch(API);
    const data=await res.json();
    all=data.map(r=>({
      _row:r._row,
      name:gv(r,"Project Name (what's it called?)",'project name','name'),
      date:gv(r,'Date Created','date created','date'),
      material:gv(r,'Materials Used','materials used','material'),
      notes:gv(r,'Notes','notes'),
      photo:gv(r,'Photo URL','photo url','Photo of Artwork','photo of artwork','photo')
    })).filter(r=>r.name||r.date);
    updateStats();populateMats();render();
  }catch(e){
    el.innerHTML=`<div class="empty">Could not load. Try refreshing.<br><small>${e.message}</small></div>`;
  }
}

function updateStats(){
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-mats').textContent=new Set(all.map(r=>r.material).filter(Boolean)).size;
  const dates=all.map(r=>r.date).filter(Boolean).sort();
  document.getElementById('s-latest').textContent=dates.length?fmtDate(dates[dates.length-1]):'—';
}

function populateMats(){
  const sel=document.getElementById('c-mat');
  const cur=sel.value;
  sel.innerHTML='<option value="">All materials</option>';
  [...new Set(all.map(r=>r.material).filter(Boolean))].sort()
    .forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===cur)o.selected=true;sel.appendChild(o);});
}

function render(){
  const q=document.getElementById('c-search').value.toLowerCase();
  const mat=document.getElementById('c-mat').value;
  const sort=document.getElementById('c-sort').value;
  let rows=all.filter(r=>
    (!q||(r.name+' '+r.notes).toLowerCase().includes(q))&&
    (!mat||r.material===mat)
  );
  if(sort==='asc')rows.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  else if(sort==='desc')rows.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  else rows.sort((a,b)=>a.name.localeCompare(b.name));

  const el=document.getElementById('gallery');
  if(!rows.length){el.className='empty';el.textContent='No artworks found.';return;}
  el.className='grid';
  el.innerHTML=rows.map(r=>{
    const t=thumb(r.photo);
    const row=r._row;
    return`<div class="card">
      ${t
        ?`<img class="card-img" src="${esc(t)}" alt="${esc(r.name)}" onclick="openLightbox('${esc(t)}')" onerror="this.outerHTML='<div class=card-placeholder>🎨</div>'">`
        :`<div class="card-placeholder">🎨</div>`}
      <div class="card-body">
        <div class="card-name">${esc(r.name)}</div>
        <div class="card-date">${fmtDate(r.date)}</div>
        ${r.material?`<span class="badge">${esc(r.material)}</span>`:''}
        ${r.notes?`<div class="card-notes">${esc(r.notes)}</div>`:''}
        <div class="card-actions">
          <button class="btn-sm" onclick="openEdit(${row})">✏️ Edit</button>
          <button class="btn-sm danger" onclick="delArtwork(${row},'${esc(r.name).replace(/'/g,"\\'")}')">🗑 Delete</button>
        </div>
      </div></div>`;
  }).join('');
}

// ── Lightbox ─────────────────────────────────────────────
function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.remove('hidden');}
function closeLightbox(){document.getElementById('lightbox').classList.add('hidden');}

// ── Add modal ────────────────────────────────────────────
function openAdd(){
  document.getElementById('add-overlay').classList.remove('hidden');
  document.getElementById('a-date').value=new Date().toISOString().split('T')[0];
}
function closeAdd(){
  document.getElementById('add-overlay').classList.add('hidden');
  clearPhoto();
  ['a-name','a-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('a-mat').value='';
  document.getElementById('a-msg').innerHTML='';
}

// ── Crop engine ───────────────────────────────────────────
function onPhoto(input){
  const f=input.files[0];if(!f)return;
  photoName=f.name;rotation=0;croppedB64=null;
  new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);})
    .then(src=>{const img=new Image();img.onload=()=>{origImg=img;initCropUI();};img.src=src;});
}

function rotSize(){return Math.abs(rotation)===90?{w:origImg.height,h:origImg.width}:{w:origImg.width,h:origImg.height};}

function initCropUI(){
  showStep('a-step-crop');
  drawFull();
  resetCropBox();
  bindCropEvents();
}

function drawFull(){
  const canvas=document.getElementById('a-canvas');
  const box=document.getElementById('a-crop-box');
  const maxW=Math.min(box.clientWidth||440,500);
  const {w,h}=rotSize();
  const sc=maxW/w;
  canvas.width=Math.round(w*sc);
  canvas.height=Math.round(h*sc);
  const ctx=canvas.getContext('2d');
  ctx.save();ctx.translate(canvas.width/2,canvas.height/2);ctx.rotate(rotation*Math.PI/180);
  ctx.drawImage(origImg,-origImg.width*sc/2,-origImg.height*sc/2,origImg.width*sc,origImg.height*sc);
  ctx.restore();
}

function drawCrop(){
  drawFull();
  const canvas=document.getElementById('a-canvas');
  const ctx=canvas.getContext('2d');
  const {x,y,w,h}=cb;
  // dim outside
  ctx.fillStyle='rgba(0,0,0,.48)';
  ctx.fillRect(0,0,canvas.width,y);
  ctx.fillRect(0,y+h,canvas.width,canvas.height-y-h);
  ctx.fillRect(0,y,x,h);
  ctx.fillRect(x+w,y,canvas.width-x-w,h);
  // border
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
  // thirds
  ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;
  [1/3,2/3].forEach(f=>{
    ctx.beginPath();ctx.moveTo(x+w*f,y);ctx.lineTo(x+w*f,y+h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y+h*f);ctx.lineTo(x+w,y+h*f);ctx.stroke();
  });
  // corner handles
  [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([hx,hy])=>{
    ctx.beginPath();ctx.arc(hx,hy,16,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.fill();
    ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.stroke();
  });
  // edge handles
  [[x+w/2,y],[x+w/2,y+h],[x,y+h/2],[x+w,y+h/2]].forEach(([hx,hy])=>{
    ctx.beginPath();ctx.arc(hx,hy,9,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.75)';ctx.fill();
  });
}

function resetCropBox(){
  const canvas=document.getElementById('a-canvas');
  const p=Math.min(canvas.width,canvas.height)*0.04;
  cb={x:p,y:p,w:canvas.width-p*2,h:canvas.height-p*2};
  drawCrop();
}

function rotateImg(deg){rotation=(rotation+deg+360)%360;initCropUI();}

function getCanvasXY(e,canvas){
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width,sy=canvas.height/r.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}

function hitHandle(px,py){
  const T=24,{x,y,w,h}=cb;
  const pts=[
    {id:'tl',x,y},{id:'tr',x:x+w,y},{id:'bl',x,y:y+h},{id:'br',x:x+w,y:y+h},
    {id:'mt',x:x+w/2,y},{id:'mb',x:x+w/2,y:y+h},{id:'ml',x,y:y+h/2},{id:'mr',x:x+w,y:y+h/2}
  ];
  for(const p of pts)if(Math.hypot(px-p.x,py-p.y)<T)return p.id;
  if(px>x&&px<x+w&&py>y&&py<y+h)return'move';
  return null;
}

function bindCropEvents(){
  const canvas=document.getElementById('a-canvas');
  canvas.onmousedown=canvas.ontouchstart=e=>{
    e.preventDefault();
    const p=getCanvasXY(e,canvas);
    drag=hitHandle(p.x,p.y);
    dragOrig={...p};cbOrig={...cb};
  };
  canvas.onmousemove=canvas.ontouchmove=e=>{
    if(!drag)return;e.preventDefault();
    const p=getCanvasXY(e,canvas);
    const dx=p.x-dragOrig.x,dy=p.y-dragOrig.y;
    const CW=canvas.width,CH=canvas.height;
    let{x,y,w,h}=cbOrig;
    if(drag==='move'){x=Math.max(0,Math.min(CW-w,x+dx));y=Math.max(0,Math.min(CH-h,y+dy));}
    else if(drag==='tl'){const nw=Math.max(HMIN,w-dx),nh=Math.max(HMIN,h-dy);x+=w-nw;y+=h-nh;w=nw;h=nh;}
    else if(drag==='tr'){w=Math.max(HMIN,w+dx);const nh=Math.max(HMIN,h-dy);y+=h-nh;h=nh;}
    else if(drag==='bl'){const nw=Math.max(HMIN,w-dx);x+=w-nw;w=nw;h=Math.max(HMIN,h+dy);}
    else if(drag==='br'){w=Math.max(HMIN,w+dx);h=Math.max(HMIN,h+dy);}
    else if(drag==='mt'){const nh=Math.max(HMIN,h-dy);y+=h-nh;h=nh;}
    else if(drag==='mb'){h=Math.max(HMIN,h+dy);}
    else if(drag==='ml'){const nw=Math.max(HMIN,w-dx);x+=w-nw;w=nw;}
    else if(drag==='mr'){w=Math.max(HMIN,w+dx);}
    x=Math.max(0,Math.min(CW-w,x));y=Math.max(0,Math.min(CH-h,y));
    w=Math.min(w,CW-x);h=Math.min(h,CH-y);
    cb={x,y,w,h};drawCrop();
  };
  canvas.onmouseup=canvas.ontouchend=()=>{drag=null;};
}

function applyCrop(){
  const canvas=document.getElementById('a-canvas');
  const {w:rw,h:rh}=rotSize();
  const scX=rw/canvas.width,scY=rh/canvas.height;
  // Build rotated full image at source res
  const tmp=document.createElement('canvas');
  const ts=Math.min(1,1800/Math.max(rw,rh));
  tmp.width=Math.round(rw*ts);tmp.height=Math.round(rh*ts);
  const tc=tmp.getContext('2d');
  tc.save();tc.translate(tmp.width/2,tmp.height/2);tc.rotate(rotation*Math.PI/180);
  tc.drawImage(origImg,-origImg.width*ts/2,-origImg.height*ts/2,origImg.width*ts,origImg.height*ts);
  tc.restore();
  // Crop from rotated
  const fx=cb.x/canvas.width*tmp.width;
  const fy=cb.y/canvas.height*tmp.height;
  const fw=cb.w/canvas.width*tmp.width;
  const fh=cb.h/canvas.height*tmp.height;
  const maxOut=1200,sc=Math.min(1,maxOut/Math.max(fw,fh));
  const out=document.createElement('canvas');
  out.width=Math.round(fw*sc);out.height=Math.round(fh*sc);
  out.getContext('2d').drawImage(tmp,fx,fy,fw,fh,0,0,out.width,out.height);
  croppedB64=out.toDataURL('image/jpeg',.85).split(',')[1];
  document.getElementById('a-preview').src='data:image/jpeg;base64,'+croppedB64;
  showStep('a-step-preview');
}

function reCrop(){croppedB64=null;showStep('a-step-crop');drawCrop();}
function clearPhoto(){
  croppedB64=null;origImg=null;rotation=0;drag=null;
  document.getElementById('a-photo').value='';
  showStep('a-step-pick');
}

// ── Submit new artwork ────────────────────────────────────
async function submitAdd(){
  const name=document.getElementById('a-name').value.trim();
  const date=document.getElementById('a-date').value;
  const material=document.getElementById('a-mat').value;
  const notes=document.getElementById('a-notes').value.trim();
  const msg=document.getElementById('a-msg');
  if(!name){msg.innerHTML='<div class="msg-err">Please enter a project name.</div>';return;}
  const btn=document.getElementById('a-btn');
  btn.textContent='Saving…';btn.disabled=true;msg.innerHTML='';
  try{
    const payload={action:'add',name,date,material,notes};
    if(croppedB64){payload.photoData=croppedB64;payload.photoName=photoName;payload.photoMime='image/jpeg';}
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const result=await res.json();
    if(result.success){msg.innerHTML='<div class="msg-ok">Saved! 🎨</div>';setTimeout(()=>{closeAdd();load();},1200);}
    else msg.innerHTML=`<div class="msg-err">Error: ${result.error||'Unknown'}</div>`;
  }catch(e){msg.innerHTML=`<div class="msg-err">Failed: ${e.message}</div>`;}
  btn.textContent='Save artwork';btn.disabled=false;
}

// ── Edit ─────────────────────────────────────────────────
function openEdit(row){
  const r=all.find(x=>x._row===row);
  if(!r)return;
  document.getElementById('e-row').value=row;
  document.getElementById('e-name').value=r.name;
  document.getElementById('e-date').value=toInputDate(r.date);
  document.getElementById('e-mat').value=r.material||'';
  document.getElementById('e-notes').value=r.notes||'';
  document.getElementById('e-msg').innerHTML='';
  document.getElementById('edit-overlay').classList.remove('hidden');
}
function closeEdit(){document.getElementById('edit-overlay').classList.add('hidden');}
async function saveEdit(){
  const row=parseInt(document.getElementById('e-row').value);
  const name=document.getElementById('e-name').value.trim();
  const date=document.getElementById('e-date').value;
  const material=document.getElementById('e-mat').value;
  const notes=document.getElementById('e-notes').value.trim();
  const msg=document.getElementById('e-msg');
  if(!name){msg.innerHTML='<div class="msg-err">Name is required.</div>';return;}
  const btn=document.getElementById('e-btn');
  btn.textContent='Saving…';btn.disabled=true;
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'edit',row,name,date,material,notes})});
    const result=await res.json();
    if(result.success){closeEdit();load();}
    else msg.innerHTML=`<div class="msg-err">${result.error||'Error'}</div>`;
  }catch(e){msg.innerHTML=`<div class="msg-err">Failed: ${e.message}</div>`;}
  btn.textContent='Save changes';btn.disabled=false;
}

// ── Delete ────────────────────────────────────────────────
async function delArtwork(row,name){
  if(!confirm(`Delete "${name}"?\nThis cannot be undone.`))return;
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'delete',row})});
    const result=await res.json();
    if(result.success)load();
    else alert('Error: '+(result.error||'Unknown'));
  }catch(e){alert('Failed: '+e.message);}
}

load();
</script>
