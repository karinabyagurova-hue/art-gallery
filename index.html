<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Child's Art Gallery</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#faf9f7;color:#1a1a1a;padding:1.5rem}
  h1{font-size:22px;font-weight:500;margin-bottom:1.5rem}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
  .add-btn{padding:8px 16px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;text-decoration:none;color:#1a1a1a}
  .add-btn:hover{background:#f0f0f0}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:1.5rem}
  .stat{background:#fff;border:1px solid #eee;border-radius:8px;padding:1rem;text-align:center}
  .stat-num{font-size:24px;font-weight:500}
  .stat-label{font-size:13px;color:#666;margin-top:4px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
  input,select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;outline:none}
  input{flex:1;min-width:160px}
  input:focus,select:focus{border-color:#aaa}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem;display:flex;flex-direction:column;gap:8px}
  .card-name{font-size:15px;font-weight:500}
  .card-date{font-size:13px;color:#888}
  .badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#555;border:1px solid #e0e0e0;width:fit-content}
  .card-notes{font-size:13px;color:#666;line-height:1.5}
  .card-link{font-size:13px;color:#1a6ef5;text-decoration:none;margin-top:auto}
  .card-link:hover{text-decoration:underline}
  .no-photo{font-size:13px;color:#bbb;margin-top:auto}
  .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;margin-bottom:4px;background:#f0f0f0}
  .thumb-link{display:block;margin-top:auto}
  .empty{text-align:center;color:#999;padding:3rem;font-size:15px}
  .loading{text-align:center;padding:3rem;color:#999}
  .error{color:#c0392b;font-size:14px;padding:1rem;background:#fdf0f0;border-radius:8px;margin-top:1rem}
</style>
</head>
<body>

<div class="header">
  <h1>🎨 My child's art gallery</h1>
  <a class="add-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSemSsN1KrPPJygtyenPoaYwIqfcxfHQj5AuWy7dtsARlb3rEg/viewform" target="_blank">+ Add artwork</a>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="total">—</div><div class="stat-label">Total artworks</div></div>
  <div class="stat"><div class="stat-num" id="mat-count">—</div><div class="stat-label">Materials used</div></div>
  <div class="stat"><div class="stat-num" id="latest">—</div><div class="stat-label">Latest entry</div></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search by name or notes…" oninput="render()">
  <select id="filter-mat" onchange="render()">
    <option value="">All materials</option>
  </select>
  <select id="sort" onchange="render()">
    <option value="desc">Newest first</option>
    <option value="asc">Oldest first</option>
    <option value="az">A → Z</option>
  </select>
</div>

<div id="gallery" class="loading">Loading artwork…</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzT-ZB5TgZS_EbdaUuX9yMxABjbYtHfEYbIJFlWFczIJUwq_eX7FOm5l8g-Dj4XhwtIog/exec';
let all = [];

function getVal(row, ...keys) {
  for (const k of keys) {
    const found = Object.keys(row).find(rk => rk.replace(/"/g,'').trim().toLowerCase() === k.toLowerCase());
    if (found && row[found]) return row[found];
  }
  return '';
}

async function load() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    all = data.map(r => ({
      name: getVal(r, "Project Name (what's it called?)", 'project name'),
      date: getVal(r, 'Date Created', 'date created'),
      material: getVal(r, 'Materials Used', 'materials used'),
      notes: getVal(r, 'Notes', 'notes'),
      photo: getVal(r, 'Photo URL', 'photo url', 'Photo of Artwork', 'photo of artwork')
    })).filter(r => r.name || r.date);
    updateStats();
    populateMaterials();
    render();
  } catch(e) {
    document.getElementById('gallery').innerHTML = `<div class="error">Could not load data. Check your Apps Script URL or try again.<br><small>${e.message}</small></div>`;
  }
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
}

function updateStats() {
  document.getElementById('total').textContent = all.length;
  const mats = new Set(all.map(r => r.material).filter(Boolean));
  document.getElementById('mat-count').textContent = mats.size;
  const dates = all.map(r => r.date).filter(Boolean).sort();
  document.getElementById('latest').textContent = dates.length ? fmtDate(dates[dates.length-1]) : '—';
}

function populateMaterials() {
  const sel = document.getElementById('filter-mat');
  const mats = [...new Set(all.map(r => r.material).filter(Boolean))].sort();
  mats.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; sel.appendChild(o); });
}

function getDriveThumb(url) {
  if (!url) return null;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  return null;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const mat = document.getElementById('filter-mat').value;
  const sort = document.getElementById('sort').value;
  let rows = all.filter(r => {
    const mq = !q || r.name.toLowerCase().includes(q) || r.notes.toLowerCase().includes(q);
    const mm = !mat || r.material === mat;
    return mq && mm;
  });
  if (sort === 'asc') rows.sort((a,b) => a.date.localeCompare(b.date));
  else if (sort === 'desc') rows.sort((a,b) => b.date.localeCompare(a.date));
  else rows.sort((a,b) => a.name.localeCompare(b.name));

  const el = document.getElementById('gallery');
  if (!rows.length) { el.className='empty'; el.textContent='No artworks found.'; return; }
  el.className = 'grid';
  el.innerHTML = rows.map(r => `
    <div class="card">
      <div class="card-name">${esc(r.name)}</div>
      <div class="card-date">${fmtDate(r.date)}</div>
      ${r.material ? `<span class="badge">${esc(r.material)}</span>` : ''}
      ${r.notes ? `<div class="card-notes">${esc(r.notes)}</div>` : ''}
      ${(() => {
        const thumb = getDriveThumb(r.photo);
        return thumb
          ? `<a class="thumb-link" href="${esc(r.photo)}" target="_blank"><img class="thumb" src="${thumb}" alt="${esc(r.name)}" onerror="this.parentElement.style.display='none'"></a>`
          : '<span class="no-photo">No photo attached</span>';
      })()}
    </div>
  `).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

load();
</script>
</body>
</html>
